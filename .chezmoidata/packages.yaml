packages:
  linux:
    npm_global_tools:
      - name: "@openai/codex"
        version: "0.120.0"
      - name: "skills"
        version: "1.5.1"
    apt_core_common:
      - bash-completion
      - curl
      - git
      - neovim
      - ripgrep
      - tmux
      - xclip
    apt_gui_common:
      - brave-browser
      - code
      - fonts-firacode
      - remmina
      - signal-desktop
    external_deb_common:
      - discord
    role_packages:
      bootstrap_auth:
        - age
        - gh
        - jq
        - lastpass-cli
        - sops
        - sshpass
      dev_cli:
        - fd-find
        - golang-go
        - nodejs
        - npm
        - pandoc
        - shellcheck
      live_sync:
        - syncthing
      management_tooling:
        - ansible-lint
        - podman
        - tcpdump
        - terraform
        - yamllint
      workstation_utilities:
        - imagemagick
      virtualization:
        - libvirt-clients
        - libvirt-daemon-system
        - qemu-system-x86
      virtualization_gui:
        - virt-manager
        - virt-viewer
        - virtinst
      sync_clients:
        - onedrive
    pacman_core_common:
      - bash-completion
      - curl
      - git
      - neovim
      - ripgrep
      - tmux
      - wl-clipboard
    pacman_role_packages:
      bootstrap_auth:
        - age
        - github-cli
        - jq
        - lastpass-cli
        - sops
        - sshpass
      dev_cli:
        - fd
        - go
        - nodejs
        - npm
        - pandoc
        - shellcheck
      live_sync:
        - syncthing
      management_tooling:
        - ansible-lint
        - tcpdump
        - terraform
        - yamllint
      workstation_utilities:
        - imagemagick
      virtualization:
        - libvirt
        - podman
        - qemu-full
      virtualization_gui:
        - virt-manager
        - virt-viewer
      sync_clients: []
    desktop_packages:
      gnome:
        - task-gnome-desktop
        - gnome-shell-extension-dashtodock
      hyprland:
        - fonts-font-awesome
        - foot
        - hyprland
        - lxpolkit
        - pipewire
        - pipewire-audio
        - pipewire-pulse
        - waybar
        - wireplumber
        - wofi
        - xdg-desktop-portal
        - xdg-desktop-portal-gtk
        - xdg-desktop-portal-hyprland
      none: []
    hosts:
      wsub-laptop01:
        os_family: debian
        distribution: debian
        package_family: apt
        desktop_family: gnome
        roles:
          - bootstrap_auth
          - dev_cli
          - live_sync
          - management_tooling
          - workstation_utilities
          - virtualization
          - virtualization_gui
          - sync_clients
        apt_extra: []
      wsub-mbp01:
        os_family: arch
        distribution: omarchy
        package_family: pacman
        desktop_family: hyprland
        roles:
          - bootstrap_auth
          - dev_cli
          - live_sync
          - management_tooling
          - workstation_utilities
          - sync_clients
        apt_source_components_extra: []
        apt_extra: []
        pacman_extra:
          - iw
          - networkmanager
    host_aliases:
      wsub-mbp01-wired: wsub-mbp01
      wsub-mbp01-wireless: wsub-mbp01
    external_binaries:
      sops:
        version: "3.12.2"
        url:
          amd64: "https://github.com/getsops/sops/releases/download/v3.12.2/sops-v3.12.2.linux.amd64"
          arm64: "https://github.com/getsops/sops/releases/download/v3.12.2/sops-v3.12.2.linux.arm64"
    lastpass_build_deps:
      - cmake
      - ca-certificates
      - debhelper
      - docbook-xsl
      - dpkg-dev
      - asciidoc
      - build-essential
      - git
      - libcurl4-openssl-dev
      - libssl-dev
      - libxml2-dev
      - pkg-config
      - quilt
      - xsltproc
