packages:
  linux:
    apt_cli_common:
      - age
      - bash-completion
      - chezmoi
      - curl
      - fd-find
      - git
      - gh
      - golang-go
      - jq
      - lastpass-cli
      - neovim
      - nodejs
      - npm
      - pandoc
      - ripgrep
      - shellcheck
      - sops
      - syncthing
      - tmux
      - xclip
      - sshpass
    apt_gui_common:
      - brave-browser
      - code
      - discord
      - firefox-esr
      - remmina
      - signal-desktop
    role_packages:
      virtualization:
        - libvirt-clients
        - libvirt-daemon-system
        - podman
        - qemu-system-x86
      virtualization_gui:
        - virt-manager
        - virt-viewer
        - virtinst
      sync_clients:
        - onedrive
    desktop_packages:
      gnome:
        - task-gnome-desktop
        - gnome-shell-extension-dashtodock
      none: []
    hosts:
      wsub-laptop01:
        desktop_family: gnome
        roles:
          - virtualization
          - virtualization_gui
          - sync_clients
        apt_extra: []
      wsub-mbp01:
        desktop_family: none
        roles: []
        apt_extra: []
    lastpass_build_deps:
      - cmake
      - ca-certificates
      - debhelper
      - docbook-xsl
      - dpkg-dev
      - asciidoc
      - build-essential
      - git
      - libcurl4-openssl-dev
      - libssl-dev
      - libxml2-dev
      - pkg-config
      - quilt
      - xsltproc
